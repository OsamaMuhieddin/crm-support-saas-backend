# Replace api.dev.example.com with your real API hostname.
# This is the initial HTTP config for host-installed NGINX.
# After DNS resolves to the VM, run:
#   sudo certbot --nginx -d api.dev.example.com
# Certbot will add the HTTPS server block and the HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name api.dev.example.com;

    client_max_body_size 25m;

    # Reject common scanner probes before they reach the Node backend.
    # Keep /.well-known available for Certbot / Let's Encrypt challenges.
    location ~ /\.(?!well-known) {
        return 404;
    }

    location ~* (^|/)(\.env|\.env\..*|phpinfo|phpinfo\.php|test\.php|info\.php|infophp\.php|infos\.php)$ {
        return 404;
    }

    location ~* \.php($|/) {
        return 404;
    }

    location ~* ^/(debug/default/view|app_dev\.php/_profiler/phpinfo)$ {
        return 404;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
