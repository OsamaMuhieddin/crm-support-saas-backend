services:
  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: crm-support-stripe-cli
    command: >
      listen
      --forward-to http://host.docker.internal:${PORT:-5000}/api/billing/webhooks/stripe
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped
