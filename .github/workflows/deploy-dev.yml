name: Deploy Dev

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-dev
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run basic validation tests
        env:
          NODE_ENV: test
          MONGO_URI: mongodb://127.0.0.1:27017/crm_support_saas_test
          STORAGE_PROVIDER: local
          STORAGE_LOCAL_ROOT: .tmp/test-storage
          S3_BUCKET: crm-support-test-files
        run: npm test -- --runTestsByPath tests/storage.config.test.js tests/i18n.interpolation.test.js tests/i18n.ar.test.js

      - name: Compute image metadata
        id: image
        shell: bash
        run: |
          OWNER_LOWER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER_LOWER}/crm-support-saas-backend"
          SHA_TAG="sha-${GITHUB_SHA}"
          BRANCH_TAG="${GITHUB_REF_NAME}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "sha_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.branch_tag }}

      - name: Upload deployment files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "docker-compose.azure.yml,deploy/*"
          target: "/opt/crm-support"

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            cd /opt/crm-support
            chmod +x deploy/*.sh
            export GHCR_USERNAME='${{ secrets.GHCR_PULL_USERNAME }}'
            export GHCR_TOKEN='${{ secrets.GHCR_PULL_TOKEN }}'
            export APP_IMAGE='${{ steps.image.outputs.image_name }}:${{ steps.image.outputs.sha_tag }}'
            export APP_ENV_FILE='/opt/crm-support/.env.azure'
            ./deploy/deploy.sh
